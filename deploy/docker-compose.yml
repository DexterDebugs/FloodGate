services:
  gateway:
    build: 
      context: ..
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - users-service
      - orders-service
      - redis

  users-service:
    build:
      context: ../backends/users-service

  orders-service:
    build:
      context: ../backends/orders-service

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
