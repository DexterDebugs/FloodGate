rate_limit:
  algorithm: adaptive
  limit: 10
  window_seconds: 60
  pid:
    kp: 0.1
    ki: 0.01
    kd: 0.05
  target_p95_ms: 100.0

api_keys:
  - "dev-key-shanksss-001"
  - "dev-key-shanksss-002"

routes:
  - name: users-service
    path: /users/
    target: http://users-service:8001
  - name: orders-service
    path: /orders/
    target: http://orders-service:8002